<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chokepoint Atlas Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Chokepoint Atlas Studio</h1>
        <p>Turn supply-chain lane JSON into a research pack, scorecard, memo, and graph.</p>
      </div>
      <div class="actions">
        <label class="modePicker" for="mode">
          <span>Mode</span>
          <select id="mode">
            <option value="pack">Research Pack</option>
            <option value="compare">Lane Compare</option>
            <option value="pipeline">Source Pipeline</option>
          </select>
        </label>
        <button id="loadSample">Load sample</button>
        <button id="buildPack" class="primary">Run</button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor">
        <div class="panelHeader">
          <h2>Input JSON</h2>
          <span id="status">Ready</span>
        </div>
        <textarea id="inputJson" spellcheck="false"></textarea>
      </section>

      <section class="results">
        <nav class="tabs" aria-label="Result tabs">
          <button class="tab active" data-tab="quick">Quick Scan</button>
          <button class="tab" data-tab="memo">Evidence Memo</button>
          <button class="tab" data-tab="score">Scorecard</button>
          <button class="tab" data-tab="graph">Graph</button>
          <button class="tab" data-tab="json">JSON</button>
        </nav>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
