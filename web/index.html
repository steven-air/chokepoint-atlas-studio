<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chokepoint Atlas Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="appShell">
      <header class="hero">
        <div class="heroCopy">
          <span class="eyebrow">Chokepoint Atlas 2.0</span>
          <h1>AI 基建瓶颈研究工作台</h1>
          <p>把供应链方向 JSON 转成可复盘的研究包：证据分层、关系图谱、评分卡、催化剂跟踪和多赛道比较。</p>
        </div>
        <div class="heroPanel" aria-label="2.0 模块状态">
          <div class="moduleItem ready">
            <strong>Evidence</strong>
            <span>证据分层</span>
          </div>
          <div class="moduleItem ready">
            <strong>Graph</strong>
            <span>关系图谱</span>
          </div>
          <div class="moduleItem ready">
            <strong>Scoring</strong>
            <span>优先级评分</span>
          </div>
          <div class="moduleItem ready">
            <strong>Output</strong>
            <span>研究包输出</span>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="运行控制">
        <label class="field" for="mode">
          <span>模式</span>
          <select id="mode">
            <option value="pack">研究包</option>
            <option value="compare">方向比较</option>
            <option value="pipeline">资料流水线</option>
          </select>
        </label>
        <button id="loadSample">加载示例</button>
        <button id="buildPack" class="primary">运行分析</button>
        <span id="status" class="status ready">就绪</span>
      </section>

      <main class="workspace">
        <section class="editor panel">
          <div class="panelHeader">
            <div>
              <h2>输入 JSON</h2>
              <p>保留原始 JSON 编辑能力，适合直接调试 2.0 数据结构。</p>
            </div>
          </div>
          <textarea id="inputJson" spellcheck="false"></textarea>
        </section>

        <section class="results panel">
          <div id="summary" class="summaryGrid" aria-live="polite"></div>
          <nav class="tabs" aria-label="结果标签">
            <button class="tab active" data-tab="overview">总览</button>
            <button class="tab" data-tab="memo">备忘录</button>
            <button class="tab" data-tab="evidence">证据</button>
            <button class="tab" data-tab="score">评分</button>
            <button class="tab" data-tab="graph">图谱</button>
            <button class="tab" data-tab="json">JSON</button>
          </nav>
          <div id="output" class="outputSurface"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
